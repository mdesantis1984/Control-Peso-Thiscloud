version: '3.8'

services:
  # ============================================
  # SQL Server Express 2022 Linux with Backup Automation
  # ============================================
  controlpeso-sqlserver:
    container_name: controlpeso-sqlserver
    # IMPORTANTE: NO usar build aquí - imagen debe pre-construirse localmente con docker build
    # Comando para construir: docker build -t controlpeso-sqlserver:latest -f Dockerfile.sqlserver .
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQLSERVER_SA_PASSWORD:?Error: SQLSERVER_SA_PASSWORD env variable required}
      - MSSQL_PID=Express
      - MSSQL_TCP_PORT=1433
    ports:
      - "1433:1433"
    volumes:
      # Persist database files
      - controlpeso-sqlserver-data:/var/opt/mssql/data

      # Persist backups (bind mount to external volume for safety)
      - /mnt/backups/controlpeso-sqlserver:/var/opt/mssql/backups

      # Persist logs
      - controlpeso-sqlserver-logs:/var/opt/mssql/log
    networks:
      - controlpeso-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      com.controlpeso.service: "database"
      com.controlpeso.version: "2022-express-with-backups"

  # ============================================
  # Control Peso Web Application
  # ============================================
  controlpeso-web:
    container_name: controlpeso-web
    # IMPORTANTE: NO usar build aquí - imagen debe pre-construirse localmente con docker build
    # Comando para construir: docker build -t controlpeso-web:latest -f Dockerfile .
    image: controlpeso-web:latest
    ports:
      - "${APP_PORT:-8080}:8080"  # External port configurable via env var (default 8080)
    environment:
      # ASP.NET Core Configuration
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

      # Data Protection keys path (for antiforgery tokens and auth cookies persistence)
      - ASPNETCORE_DataProtection__Path=/root/.aspnet/DataProtection-Keys

      # Database Connection (SQL Server)
      - ConnectionStrings__DefaultConnection=Server=controlpeso-sqlserver,1433;Database=ControlPeso;User Id=sa;Password=${SQLSERVER_SA_PASSWORD:?Error: SQLSERVER_SA_PASSWORD env variable required};TrustServerCertificate=True

      # Logging Configuration (ThisCloud.Framework)
      - ThisCloud__Loggings__IsEnabled=true
      - ThisCloud__Loggings__MinimumLevel=Warning
      - ThisCloud__Loggings__Console__Enabled=false
      - ThisCloud__Loggings__File__Enabled=true
      - ThisCloud__Loggings__File__Path=/app/logs/controlpeso-.ndjson
      - ThisCloud__Loggings__File__RollingFileSizeMb=10
      - ThisCloud__Loggings__File__RetainedFileCountLimit=60
      - ThisCloud__Loggings__File__UseCompactJson=true
      - ThisCloud__Loggings__Redaction__Enabled=true
      - ThisCloud__Loggings__Correlation__HeaderName=X-Correlation-Id
      - ThisCloud__Loggings__Correlation__GenerateIfMissing=true

      # Security & Domain Configuration
      - AllowedHosts=controlpeso.thiscloud.com.ar
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true

      # ⚠️ SECRETS: Configure using environment variables or docker-compose.override.yml
      # REQUIRED:
      #   - SQLSERVER_SA_PASSWORD: SQL Server SA password
      #   - GOOGLE_CLIENT_ID: Google OAuth Client ID
      #   - GOOGLE_CLIENT_SECRET: Google OAuth Client Secret
      #   - TELEGRAM_BOT_TOKEN: Telegram Bot Token (if notifications enabled)
      #   - TELEGRAM_CHAT_ID: Telegram Chat ID (if notifications enabled)
      # DO NOT add sensitive values here - this file is tracked by Git
    
    volumes:
      # Persist logs
      - controlpeso-logs:/app/logs

      # Persist Data Protection keys (antiforgery tokens, authentication cookies)
      - controlpeso-keys:/root/.aspnet/DataProtection-Keys

      # Persist uploaded avatars
      - controlpeso-uploads:/app/wwwroot/uploads
    
    networks:
      - controlpeso-network
    
    depends_on:
      controlpeso-sqlserver:
        condition: service_healthy
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    labels:
      com.controlpeso.service: "web"
      com.controlpeso.version: "1.3.0"
      com.controlpeso.domain: "controlpeso.thiscloud.com.ar"

# ============================================
# Networks
# ============================================
networks:
  controlpeso-network:
    driver: bridge
    name: controlpeso-network

# ============================================
# Volumes
# ============================================
volumes:
  # SQL Server data persistence
  controlpeso-sqlserver-data:
    driver: local
    name: controlpeso-sqlserver-data

  # SQL Server logs persistence
  controlpeso-sqlserver-logs:
    driver: local
    name: controlpeso-sqlserver-logs

  # Application logs persistence
  controlpeso-logs:
    driver: local
    name: controlpeso-logs

  # Data Protection keys persistence (antiforgery, auth cookies)
  controlpeso-keys:
    driver: local
    name: controlpeso-keys

  # User uploads persistence (avatars)
  controlpeso-uploads:
    driver: local
    name: controlpeso-uploads
